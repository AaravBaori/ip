name: Java 17 JAR Compatibility Test

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test-jar:
    strategy:
      # If one OS fails, keep running the others to see their results
      fail-fast: false 
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    runs-on: ${{ matrix.os }}

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Test JAR Execution
      shell: bash
      # We pipe "bye" into the JAR so it immediately exits successfully. 
      # If the Java version is wrong, it will crash before even reading the input.
      run: echo "bye" | java -jar ip.jar
